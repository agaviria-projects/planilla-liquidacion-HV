<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planillas de Liquidación HV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; background: #f7f7f7; }
    header {

      display:flex;
    
      align-items:center;
    
      justify-content:center;
    
      margin-bottom:15px;
    
    }
    
    .logo {
    
      width:55px;
    
      margin-right:10px;
    
    }
    
    header h2 {
    
      color:#004b2d;
    
      font-weight:bold;
    
      font-size:20px;
    
    }
    
    .footer-container {
    
      display:flex;
    
      align-items:center;
    
      justify-content:center;
    
      flex-direction:column;
    
      margin-top:20px;
    
      text-align:center;
    
    }
    
    .footer-logo {
    
      width:60px;
    
      margin-bottom:5px;
    
    }
    
    .footer-text {
    
      font-size:13px;
    
      color:#444;
    
    }
    
    .frase {
    
      color:#008c4a;
    
      font-style:italic;
    
      font-weight:bold;
    
    }
    h2 { text-align: center; margin-bottom: 15px; }
    .selector-estrato{

      background:white;
    
      padding:12px;
    
      border-radius:8px;
    
      margin-bottom:15px;
    
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    
      font-weight:bold;
    
    }
    .card {
      background: white; padding: 12px; margin-bottom: 15px;
      border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .item { font-weight: bold; font-size: 18px; margin-bottom: 3px; color:#222; }
    .desc { font-size: 13px; margin-bottom: 10px; color:#444; }
    .valores {
      font-size: 14px; margin: 4px 0;
      display: flex; justify-content: space-between;
    }
    .valores span { font-weight: bold; }
    .cantidad-box {
      margin: 8px 0; display: flex; align-items: center;
    }
    .cantidad-box label { margin-right: 10px; font-size: 14px; }
    input[type="number"] {
      width: 90px; padding: 6px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 15px; text-align: center;
    }
    .totales {
      display: flex; justify-content: space-between;
      font-size: 14px; margin-top: 6px;
    }
    .totales span { font-weight: bold; }
    .resumen {
      background: #008c4a; padding: 18px; border-radius: 8px;
      margin-top: 20px; font-size: 18px; font-weight: bold;
    }
    .resumen div {
      display: flex; justify-content: space-between;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <header>
    <img
      src="elite.png"
      alt="Elite Ingenieros"
      class="logo"
    >
  
    <h2>Planilla de Liquidación HV</h2>

</header>
  <div style="text-align: right; margin: 10px;">

    <button
      onclick="limpiarTodo()"
      style="
        background-color:#007f4f;
        color:white;
        border:none;
        padding:8px 16px;
        border-radius:6px;
        cursor:pointer;
        font-weight:bold;
      "
    >
  
      Limpiar Cantidades
  
    </button>
  
  </div>
  <div class="selector-estrato">

    <label>
      <input type="radio" name="estrato" value="123" checked>
      Estrato 1-2-3
    </label>

    <label style="margin-left:20px;">
      <input type="radio" name="estrato" value="456">
      Estrato 4-5-6
    </label>

  </div>

  <div id="contenedor-items"></div>

  <div class="resumen">

    <div>
      <span>SUMA CANTIDADES:</span>
      <span id="sumaCantidades">0</span>
    </div>

    <div>
      <span>TOTAL EPM:</span>
      <span id="totalCliente">$ 0</span>
    </div>

  </div>
  
  <script>

    let tipoEstrato = "123";

    const items = [

      {
        codigo:"A03U",
        desc:"Instalación acometida caja multimedidores",

        estrato123:70290,
        estrato456:90500
      },

      {
        codigo:"A04R",
        desc:"Colocación acometida aérea Cu neutro conc.",

        estrato123:147240,
        estrato456:182000
      },

      {
        codigo:"A04U",
        desc:"Colocación acometida aérea Cu neutro conc.",

        estrato123:147240,
        estrato456:182000
      },

      {
        codigo:"A05R",
        desc:"Colocación acometida aérea Al neutro conc.",

        estrato123:157300,
        estrato456:199500
      },

      {
        codigo:"A05U",
        desc:"Colocación acometida aérea Al neutro conc.",

        estrato123:157300,
        estrato456:199500
      }

    ];

    const contenedor =
      document.getElementById("contenedor-items");

    items.forEach((it, index) => {

      const card = document.createElement("div");

      card.className = "card";

      card.innerHTML = `

        <div class="item">
          ${it.codigo}
        </div>

        <div class="desc">
          ${it.desc}
        </div>

        <div class="valores">

          <div>Valor EPM:</div>

          <span id="precio-${index}">
            ${formato(it.estrato123)}
          </span>

        </div>

        <div class="cantidad-box">

          <label>Cantidad:</label>

          <input
            type="number"
            min="0"
            value=""
            id="cant-${index}"
          />

        </div>

        <div class="totales">

          <div>Total:</div>

          <span id="totCliente-${index}">
            $ 0
          </span>

        </div>

      `;

      contenedor.appendChild(card);

      document
        .getElementById(`cant-${index}`)
        .addEventListener("input", actualizar);

    });

    document
      .querySelectorAll('input[name="estrato"]')
      .forEach(radio => {

        radio.addEventListener("change", e => {

          tipoEstrato = e.target.value;

          actualizar();

        });

      });

    function formato(num) {

      return "$ " +
        num.toLocaleString("es-CO");

    }

    function actualizar() {

      let sumaCant = 0;

      let totalCli = 0;

      items.forEach((it, index) => {

        const cant =
          parseInt(
            document.getElementById(`cant-${index}`).value
          ) || 0;

        sumaCant += cant;

        const precio =
          tipoEstrato === "123"
          ? it.estrato123
          : it.estrato456;

        const total =
          cant * precio;

        totalCli += total;

        document.getElementById(`precio-${index}`)
          .innerText = formato(precio);

        document.getElementById(`totCliente-${index}`)
          .innerText = formato(total);

      });

      document.getElementById("sumaCantidades")
        .innerText = sumaCant;

      document.getElementById("totalCliente")
        .innerText = formato(totalCli);

    }
    function limpiarTodo() {
  
    items.forEach((it, index) => {
  
      document.getElementById(`cant-${index}`).value = 0;
  
      document.getElementById(`totCliente-${index}`)
        .innerText = "$ 0";
  
    });
  
    document.getElementById("sumaCantidades")
      .innerText = "0";
  
    document.getElementById("totalCliente")
      .innerText = "$ 0";
  
  }
  </script>
  <footer>
  
    <div class="footer-container">
  
      <img
        src="elite.png"
        alt="Logo Elite Ingenieros"
        class="footer-logo"
      >
  
      <div class="footer-text">
  
        <span>
          © 2025 Elite Ingenieros S.A.S.
        </span>
  
        <br>
  
        <span class="frase">
          Pasión por lo que hacemos.
        </span>
  
      </div>
  
    </div>
  
  </footer>
</body>
</html>
