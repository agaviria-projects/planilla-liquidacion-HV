<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planillas de Liquidación HV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; background: #f7f7f7; }
    header {

      display:flex;
    
      align-items:center;
    
      justify-content:center;
    
      margin-bottom:15px;
    
    }
    
    .logo {
    
      width:55px;
    
      margin-right:10px;
    
    }
    
    header h2 {
    
      color:#004b2d;
    
      font-weight:bold;
    
      font-size:20px;
    
    }
    
    .footer-container {
    
      display:flex;
    
      align-items:center;
    
      justify-content:center;
    
      flex-direction:column;
    
      margin-top:20px;
    
      text-align:center;
    
    }
    
    .footer-logo {
    
      width:60px;
    
      margin-bottom:5px;
    
    }
    
    .footer-text {
    
      font-size:13px;
    
      color:#444;
    
    }
    
    .frase {
    
      color:#008c4a;
    
      font-style:italic;
    
      font-weight:bold;
    
    }
    h2 { text-align: center; margin-bottom: 15px; }
    .selector-estrato{

      background:white;
    
      padding:12px;
    
      border-radius:8px;
    
      margin-bottom:15px;
    
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    
      font-weight:bold;
    
    }
    .card {
      background: white; padding: 12px; margin-bottom: 15px;
      border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .item { font-weight: bold; font-size: 18px; margin-bottom: 3px; color:#222; }
    .desc { font-size: 13px; margin-bottom: 10px; color:#444; }
    .valores {
      font-size: 14px; margin: 4px 0;
      display: flex; justify-content: space-between;
    }
    .valores span { font-weight: bold; }
    .cantidad-box {
      margin: 8px 0; display: flex; align-items: center;
    }
    .cantidad-box label { margin-right: 10px; font-size: 14px; }
    input[type="number"] {
      width: 90px; padding: 6px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 15px; text-align: center;
    }
    .totales {
      display: flex; justify-content: space-between;
      font-size: 14px; margin-top: 6px;
    }
    .totales span { font-weight: bold; }
    .resumen {

      background: #008c4a;
    
      color: white;
    
      padding: 18px;
    
      border-radius: 10px;
    
      margin-top: 20px;
    
      font-size: 18px;
    
      font-weight: bold;
    
      box-shadow:
        0 3px 6px rgba(0,0,0,0.15);
    
    }
    .resumen div {

      display: flex;
    
      justify-content: space-between;
    
      align-items: center;
    
      margin: 10px 0;
    
      border-bottom:
        1px solid rgba(255,255,255,0.3);
    
      padding-bottom: 5px;
    
    }
    .resumen div:last-child {

      border-bottom: none;
    
    }
  </style>
</head>
<body>

  <header>
    <img
      src="elite.png"
      alt="Elite Ingenieros"
      class="logo"
    >
  
    <h2>Planilla de Liquidación HV</h2>

</header>
  <div style="text-align: right; margin: 10px;">

    <button
      onclick="limpiarTodo()"
      style="
        background-color:#007f4f;
        color:white;
        border:none;
        padding:8px 16px;
        border-radius:6px;
        cursor:pointer;
        font-weight:bold;
      "
    >
  
      Limpiar Cantidades
  
    </button>
  
  </div>
  <div class="selector-estrato">

    <label>
      <input type="radio" name="estrato" value="123" checked>
      Estrato 1-2-3
    </label>

    <label style="margin-left:20px;">
      <input type="radio" name="estrato" value="456">
      Estrato 4-5-6
    </label>

  </div>

  <div id="contenedor-items"></div>

  <div class="resumen">

    <div>
      <span>SUMA CANTIDADES:</span>
      <span id="sumaCantidades">0</span>
    </div>

    <div>
      <span>TOTAL EPM:</span>
      <span id="totalCliente">$ 0</span>
    </div>

  </div>
  
  <script>

    let tipoEstrato = "123";

    const items = [

      {
        codigo:"A02U/R",
        desc:"Conexión de acometida a la red de distribución secundaria utilizando juego de conectores o a caja portabornera o a caja subterránea.",
        estrato123:118732,
        estrato456:158309
      },

      {
        codigo:"A03U/R",
        desc:"Instalación y conexión de acometidas dentro de la caja multimedida a medidores prepago/pospago bicuerpo..",
        estrato123:80791,
        estrato456:107722
      },

      {
        codigo:"A04U/R",
        desc:"Colocación de acometida aérea en cable cobre con neutro concéntrico.",
        estrato123:167070,
        estrato456:222760
      },

      {
        codigo:"A05U/R",
        desc:"Colocación acometida aérea cable aluminio neutro concéntrico (bifilar-Al 2x6 AWG o trifilar-Al 3x6 AWG).",
        estrato123:172753,
        estrato456:230338
      },

      {
        codigo:"A06U/R",
        desc:"Colocación de acometida aérea en cable cobre con neutro concéntrico (bifilar-Cu 2x8 AWG o trifilar-Cu 3x8 AWG) o cable aluminio con neutro concéntrico (bifilar-Al 2x6 AWG o trifilar-Al 3x6 AWG) para instalación de medidor prepago/pospago en poste o cruceta normas RA6-016, RA8-020.",
        estrato123:87858,
        estrato456:117144
      },

      {
        codigo:"A07U/R",
        desc:"Colocación de acometida aérea en cable de fuerza (3x4 AWG Cu).",
        estrato123:181357,
        estrato456:241810
      },

      {
        codigo:"A08U/R",
        desc:"Colocación acometida subterránea en cable concéntrico (Cu, Al) o cable fuerza.",
        estrato123:79643,
        estrato456:106190
      },

        {
        codigo:"A09U/R",
        desc:"Suministro y colocación de tubería PVC de 1" canalizada.",
        estrato123:76843,
        estrato456:102458
      },

        {
        codigo:"A10U/R",
        desc:"Colocación caja herm. medidor monofásico, bifásico o trifásico fachada o poste.",
        estrato123:135239,
        estrato456:180318
      },

      {
        codigo:"C10U/R",
        desc:"Apertura o cierre de equipos de maniobra monofásicos o trifásicos, (STP).",
        estrato123:0,
        estrato456:0
      },

        {
        codigo:"A11U/R",
        desc:"Instalación de caja multimedidores para medidores prepagos/pospago.",
        estrato123:0,
        estrato456:0
      },

        {
        codigo:"A12U/R",
        desc:"Instalación de medidor de energía directa monofásico, bifásico o trifásico.",
        estrato123:110200,
        estrato456:146933
      },

        {
        codigo:"A16U/R",
        desc:"Instalación de medidor Pospago/Prepago bicuerpo (Norma RA8-020 o RA6-016).",
        estrato123:250126,
        estrato456:333501
      },

        {
        codigo:"A17U/R",
        desc:"Colocación de breakers de 40 A monopolar 120 V o bipolar 240/120 V 10 kA.",
        estrato123:16516,
        estrato456:22021
      },

    ];

    const contenedor =
      document.getElementById("contenedor-items");

    items.forEach((it, index) => {

      const card = document.createElement("div");

      card.className = "card";

      card.innerHTML = `

        <div class="item">
          ${it.codigo}
        </div>

        <div class="desc">
          ${it.desc}
        </div>

        <div class="valores">

          <div>Valor EPM:</div>

          <span id="precio-${index}">
            ${formato(it.estrato123)}
          </span>

        </div>

        <div class="cantidad-box">

          <label>Cantidad:</label>

          <input
            type="number"
            min="0"
            value=""
            id="cant-${index}"
          />

        </div>

        <div class="totales">

          <div>Total:</div>

          <span id="totCliente-${index}">
            $ 0
          </span>

        </div>

      `;

      contenedor.appendChild(card);

      document
        .getElementById(`cant-${index}`)
        .addEventListener("input", actualizar);

    });

    document
      .querySelectorAll('input[name="estrato"]')
      .forEach(radio => {

        radio.addEventListener("change", e => {

          tipoEstrato = e.target.value;

          actualizar();

        });

      });

    function formato(num) {

      return "$ " +
        num.toLocaleString("es-CO");

    }

    function actualizar() {

      let sumaCant = 0;

      let totalCli = 0;

      items.forEach((it, index) => {

        const cant =
          parseInt(
            document.getElementById(`cant-${index}`).value
          ) || 0;

        sumaCant += cant;

        const precio =
          tipoEstrato === "123"
          ? it.estrato123
          : it.estrato456;

        const total =
          cant * precio;

        totalCli += total;

        document.getElementById(`precio-${index}`)
          .innerText = formato(precio);

        document.getElementById(`totCliente-${index}`)
          .innerText = formato(total);

      });

      document.getElementById("sumaCantidades")
        .innerText = sumaCant;

      document.getElementById("totalCliente")
        .innerText = formato(totalCli);

    }
    function limpiarTodo() {
  
    items.forEach((it, index) => {
  
      document.getElementById(`cant-${index}`).value = 0;
  
      document.getElementById(`totCliente-${index}`)
        .innerText = "$ 0";
  
    });
  
    document.getElementById("sumaCantidades")
      .innerText = "0";
  
    document.getElementById("totalCliente")
      .innerText = "$ 0";
  
  }
  </script>
  <footer>
  
    <div class="footer-container">
  
      <img
        src="elite.png"
        alt="Logo Elite Ingenieros"
        class="footer-logo"
      >
  
      <div class="footer-text">
  
        <span>
          © 2025 Elite Ingenieros S.A.S.
        </span>
  
        <br>
  
        <span class="frase">
          Pasión por lo que hacemos.
        </span>
  
      </div>
  
    </div>
  
  </footer>
</body>
</html>
